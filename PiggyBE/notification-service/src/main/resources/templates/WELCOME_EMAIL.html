<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Welcome to Piggy</title>
</head>

<body style="font-family: Arial, sans-serif; color: #333; line-height: 1.6;">
    <div style="max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
        <h2 style="color: #ff6b6b; text-align: center;">Welcome to Piggy! 🐷</h2>
        <p>Hi <b th:text="${name}">User</b>,</p>
        <p>Thank you for registering at Piggy. We're excited to have you on board!</p>
        <p>Piggy helps you manage your personal finances easily and efficiently.</p>
        <br>
        <p>Best Regards,</p>
        <p><b>The Piggy Team</b></p>
    </div>
</body>

</html>
